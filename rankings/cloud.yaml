      source: "console.groq.com — 2026-06"
    - provider: groq
      model: llama-3.1-8b-instant
      arena_elo: 1211
      source: "lmmarketcap.com/benchmarks/arena_elo — 2026-06"
    # ── OpenRouter (free tier) ─────────────────────────────────────────────
