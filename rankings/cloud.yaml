# Cloud model rankings — external public benchmarks only
# No live benchmark calls (quota protection policy)
# Sources:
#   arena_elo — lmmarketcap.com/benchmarks/arena_elo, huggingface.co/datasets/mathewhe/chatbot-arena-elo (2026-06)
#   groq scores — console.groq.com model pages (2026-06)
#   Meta/NVIDIA technical reports
# slot 0 = best for category (used as fallback when no local model is ranked)
# Local models are always preferred over cloud when available (cost $0 vs latency)
#
# NVIDIA NIM free tier: build.nvidia.com — 1,000 credits on signup, 40 RPM global
#   Auth: NVIDIA_API_KEY (nvapi-* key), base URL: https://integrate.api.nvidia.com/v1
#
# Groq free tier: 30 RPM, 1K RPD, 8K TPM per model
#   NOTE: llama-3.3-70b-versatile deprecated 2026-06-29, decommissioned 2026-08-16
#   Replacements: openai/gpt-oss-120b and qwen/qwen3.6-27b

categories:

  reasoning:
    - provider: nvidia
      model: deepseek-ai/deepseek-v4-pro
      arena_elo: 1370
      note: "Reasoning-specialized; 1M token context. ELO extrapolated (DeepSeek R1=1369, V4 > R1)."
      source: "lmmarketcap.com/benchmarks/arena_elo — 2026-06"
