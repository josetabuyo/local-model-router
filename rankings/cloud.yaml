# Cloud model rankings — external public benchmarks only
# No live benchmark calls (quota protection policy)
# Sources:
#   arena_elo — lmmarketcap.com/benchmarks/arena_elo (2026-06-29)
#   groq scores — console.groq.com model pages (2026-06)
#   openrouter — openrouter.ai/models (2026-06-29)
# slot 0 = best for category; cascade order: NVIDIA NIM → Groq → OpenRouter
#
# Rate limits (free tier):
#   NVIDIA NIM:   40 RPM global, 1 000 credits on signup — build.nvidia.com
#   Groq:         30 RPM / 1 000 RPD / 8 K TPM per model
#   OpenRouter:   20 RPM / 200 RPD per model
#
# Auth env vars: NVIDIA_API_KEY, GROQ_API_KEY, OPENROUTER_API_KEY
# NOTE: Groq llama-3.3-70b-versatile deprecated 2026-06-29, decommissioned 2026-08-16

categories:

  reasoning:
    # ── NVIDIA NIM ─────────────────────────────────────────────────────────
    - provider: nvidia
      model: deepseek-ai/deepseek-v4-pro
      arena_elo: 1370
      note: "Reasoning-specialized; 1M token context. ELO extrapolated (DeepSeek R1=1369)."
      source: "lmmarketcap.com/benchmarks/arena_elo — 2026-06"
    - provider: nvidia
      model: moonshotai/kimi-k2.6
      arena_elo: 1461
      source: "lmmarketcap.com/benchmarks/arena_elo — 2026-06"
    - provider: nvidia
      model: z-ai/glm-5.1
      arena_elo: 1473
      source: "lmmarketcap.com/benchmarks/arena_elo — 2026-06"
    # ── Groq ───────────────────────────────────────────────────────────────
    - provider: groq
